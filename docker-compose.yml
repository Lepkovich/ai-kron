services:

  node-app:
    build: ./node-app
    container_name: ai-node
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    networks:
      - ai-network

  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./admin:/usr/share/nginx/html/admin:ro
    depends_on:
      - node-app
    networks:
      - ai-network

networks:
  ai-network:
