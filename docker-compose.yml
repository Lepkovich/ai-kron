

services:

  node-app:
    build: ./node-app
    container_name: ai-node
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy  # ждём реальной готовности БД
    networks:
      - ai-network

  postgres:
    image: postgres:16-alpine
    container_name: ai-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ai-network
    healthcheck:  # добавляем healthcheck
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5


  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./admin:/usr/share/nginx/html/admin:ro
    depends_on:
      - node-app
    networks:
      - ai-network

  qdrant:
    image: qdrant/qdrant
    container_name: ai-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai-network

networks:
  ai-network:

volumes:
  postgres_data:
  qdrant_data: